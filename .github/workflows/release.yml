name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install CUDA Toolkit
        id: cuda
        uses: Jimver/cuda-toolkit@master
        with:
          cuda: "13.1.0"
          method: network

      - name: Add CUDA libs to linker path
        shell: bash
        run: |
          echo "CUDA_PATH=$CUDA_PATH"
          # Find where cublas.lib actually lives
          find "$CUDA_PATH" -name "cublas.lib" 2>/dev/null || echo "cublas.lib not found!"
          # Add all possible lib dirs to LIB env var
          echo "LIB=$CUDA_PATH\\lib\\x64;$CUDA_PATH\\lib;$LIB" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: "--features cuda"
          tagName: ${{ github.ref_name }}
          releaseName: "CircuitClaude ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
