name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          # Include CUDA version in cache key so changing CUDA invalidates stale cmake artifacts
          key: "cuda-13.1"

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@master
        with:
          cuda: "13.1.0"
          method: network

      - name: Configure CUDA environment
        shell: bash
        run: |
          # Force cmake to use our CUDA 13.1, not the runner's pre-installed 12.6
          echo "CUDAToolkit_ROOT=$CUDA_PATH" >> $GITHUB_ENV
          echo "CMAKE_CUDA_COMPILER=$CUDA_PATH/bin/nvcc.exe" >> $GITHUB_ENV
          echo "LIB=$CUDA_PATH\\lib\\x64;$CUDA_PATH\\lib;$LIB" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: "--features cuda"
          tagName: ${{ github.ref_name }}
          releaseName: "CircuitClaude ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
