<meta charset="UTF-8">
<title>CircuitClaude Style Explorations</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: "Segoe UI", system-ui, sans-serif; font-size: 13px; background: #0c0c10; }
  .switch { height: 42px; display: flex; align-items: center; gap: 4px; padding: 0 12px;
    background: #0c0c10; border-bottom: 1px solid #222; }
  .switch button { background: none; border: 1px solid transparent; border-radius: 4px; color: #888;
    font: 12px "Segoe UI", sans-serif; padding: 5px 12px; cursor: pointer; }
  .switch button.on { color: #fff; border-color: #444; background: #1a1a20; }
  .switch .note { margin-left: auto; color: #555; font-size: 11px; }
  #stage { height: calc(100vh - 42px); }

  /* shared layout, skin-agnostic */
  .app { height: 100%; display: flex; flex-direction: column; font-family: var(--ui); font-size: 13px;
    background: var(--bg); color: var(--t1); }
  .titlebar { height: 34px; flex-shrink: 0; display: flex; align-items: center; gap: 12px;
    padding: 0 12px; color: var(--t3); }
  .titlebar .win { margin-left: auto; }
  .cols { flex: 1; display: flex; min-height: 0; }
  .sidebar { width: 280px; flex-shrink: 0; display: flex; flex-direction: column; }
  .sb-hd { height: 40px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px; color: var(--t3); }
  .sb-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .proj { display: flex; align-items: center; gap: 8px; height: 34px; padding: 0 14px; cursor: pointer; color: var(--t2); }
  .proj .cnt { margin-left: auto; color: var(--t3); font-size: 11px; }
  .sess { display: flex; align-items: center; gap: 8px; height: 30px; padding: 0 14px 0 28px; cursor: pointer; color: var(--t2); }
  .sess .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.run { background: var(--ok); }
  .dot.wait { background: var(--warn); }
  .dot.idle { background: var(--t4); }
  .sb-ft { flex-shrink: 0; display: flex; gap: 12px; padding: 10px 14px; color: var(--t3); }
  .sb-ft span { cursor: pointer; }
  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .tabs { height: 38px; flex-shrink: 0; display: flex; align-items: center; padding: 0 10px; gap: 4px; }
  .tab { padding: 6px 14px; color: var(--t3); cursor: pointer; }
  .term { flex: 1; padding: 16px 20px; font-family: var(--mono); font-size: 12.5px; line-height: 1.6; overflow: hidden; }
  .term .p { color: var(--ok); }
  .term .dim { color: var(--t3); }
  .status { height: 26px; flex-shrink: 0; display: flex; align-items: center; gap: 16px;
    padding: 0 14px; color: var(--t3); font-size: 11px; }

  /* ===== skin: velvet (Arc/Raycast soft depth) ===== */
  .sk-velvet { --ui: "Segoe UI", system-ui, sans-serif; --mono: "Cascadia Mono", Consolas, monospace;
    --bg: linear-gradient(160deg, #17141f 0%, #100e16 60%); --t1: #eceaf2; --t2: #b6b2c4; --t3: #746f85;
    --t4: #3d3a4a; --ok: #5dd39e; --warn: #f5a35c; background: var(--bg); }
  .sk-velvet .sidebar { margin: 8px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px; backdrop-filter: blur(20px); }
  .sk-velvet .proj { font-weight: 600; color: #d9d5e6; }
  .sk-velvet .sess { margin: 0 8px; padding: 0 8px 0 22px; border-radius: 8px; height: 30px; }
  .sk-velvet .sess:hover { background: rgba(255,255,255,0.05); }
  .sk-velvet .sess.act { background: rgba(167,120,255,0.16); color: #fff; box-shadow: 0 0 0 1px rgba(167,120,255,0.25); }
  .sk-velvet .dot.run { box-shadow: 0 0 8px var(--ok); }
  .sk-velvet .dot.wait { box-shadow: 0 0 8px var(--warn); }
  .sk-velvet .main { margin: 8px 8px 8px 0; background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; overflow: hidden; }
  .sk-velvet .tab { border-radius: 8px; }
  .sk-velvet .tab.act { background: rgba(167,120,255,0.16); color: #cbb3ff; }
  .sk-velvet .status { border-top: 1px solid rgba(255,255,255,0.06); }

  /* ===== skin: warp (modern terminal product) ===== */
  .sk-warp { --ui: "Segoe UI", system-ui, sans-serif; --mono: "Cascadia Mono", Consolas, monospace;
    --bg: #16181d; --t1: #e6e9ef; --t2: #aab1bd; --t3: #6b7280; --t4: #343a45; --ok: #3fdc97; --warn: #ffbb3d; }
  .sk-warp .titlebar { background: #1c1f26; border-bottom: 1px solid #262a33; }
  .sk-warp .sidebar { background: #1c1f26; border-right: 1px solid #262a33; }
  .sk-warp .proj { font-weight: 600; color: #dfe3ea; }
  .sk-warp .sess { margin: 1px 8px; padding: 0 8px 0 22px; border-radius: 6px; }
  .sk-warp .sess:hover { background: #232833; }
  .sk-warp .sess.act { background: #263042; color: #fff; box-shadow: inset 2px 0 0 #3f8cff; }
  .sk-warp .tabs { border-bottom: 1px solid #262a33; }
  .sk-warp .tab { border-radius: 6px 6px 0 0; }
  .sk-warp .tab.act { color: #fff; box-shadow: inset 0 -2px 0 #3f8cff; }
  .sk-warp .term { background: #14161b; }
  .sk-warp .status { background: #1c1f26; border-top: 1px solid #262a33; }

  /* ===== skin: paper (light, calm) ===== */
  .sk-paper { --ui: "Segoe UI", system-ui, sans-serif; --mono: "Cascadia Mono", Consolas, monospace;
    --bg: #fafaf7; --t1: #2c2c28; --t2: #55554e; --t3: #8f8f85; --t4: #d4d4ca; --ok: #3d9960; --warn: #cf7a1f; }
  .sk-paper .titlebar { border-bottom: 1px solid #e6e6de; background: #f2f2ec; }
  .sk-paper .sidebar { background: #f2f2ec; border-right: 1px solid #e6e6de; }
  .sk-paper .proj { font-weight: 600; }
  .sk-paper .sess:hover { background: #e9e9e0; }
  .sk-paper .sess.act { background: #e1e6dc; color: #1e241c; box-shadow: inset 2px 0 0 #3d9960; }
  .sk-paper .tabs { border-bottom: 1px solid #e6e6de; }
  .sk-paper .tab.act { color: #2c2c28; box-shadow: inset 0 -2px 0 #3d9960; }
  .sk-paper .status { border-top: 1px solid #e6e6de; background: #f2f2ec; }

  /* ===== skin: forge (Zed-like crisp industrial) ===== */
  .sk-forge { --ui: "Segoe UI", system-ui, sans-serif; --mono: "Cascadia Mono", Consolas, monospace;
    --bg: #101214; --t1: #dde3e8; --t2: #9aa6b0; --t3: #5d6871; --t4: #2b3238; --ok: #7bc86c; --warn: #e5b567; }
  .sk-forge .titlebar { border-bottom: 1px solid #22282d; }
  .sk-forge .sidebar { border-right: 1px solid #22282d; }
  .sk-forge .proj { text-transform: uppercase; font-size: 11px; letter-spacing: 0.07em; color: #7d8a94; }
  .sk-forge .sess { border-left: 1px solid #22282d; margin-left: 20px; padding-left: 12px; }
  .sk-forge .sess:hover { background: #171b1f; }
  .sk-forge .sess.act { background: #1b2126; color: #fff; border-left: 1px solid #e5643f; }
  .sk-forge .dot { border-radius: 0; width: 7px; height: 7px; }
  .sk-forge .tabs { border-bottom: 1px solid #22282d; gap: 0; padding: 0; }
  .sk-forge .tab { border-right: 1px solid #22282d; height: 100%; display: flex; align-items: center; }
  .sk-forge .tab.act { background: #101214; color: #e5643f; box-shadow: inset 0 2px 0 #e5643f; }
  .sk-forge .status { border-top: 1px solid #22282d; }

  /* ===== skin: dusk (warm charcoal, amber accent) ===== */
  .sk-dusk { --ui: "Segoe UI", system-ui, sans-serif; --mono: "Cascadia Mono", Consolas, monospace;
    --bg: #191512; --t1: #ece4da; --t2: #b8ac9e; --t3: #7d7264; --t4: #3d362e; --ok: #a3c76d; --warn: #e8a33d; }
  .sk-dusk .titlebar { border-bottom: 1px solid #2a241e; }
  .sk-dusk .sidebar { background: #1e1915; border-right: 1px solid #2a241e; }
  .sk-dusk .proj { font-weight: 600; color: #dfd4c6; }
  .sk-dusk .sess { margin: 1px 8px; padding: 0 8px 0 22px; border-radius: 7px; }
  .sk-dusk .sess:hover { background: #262019; }
  .sk-dusk .sess.act { background: rgba(232,163,61,0.13); color: #f5ead9; box-shadow: inset 2px 0 0 #e8a33d; }
  .sk-dusk .tabs { border-bottom: 1px solid #2a241e; }
  .sk-dusk .tab { border-radius: 7px; }
  .sk-dusk .tab.act { background: rgba(232,163,61,0.13); color: #e8a33d; }
  .sk-dusk .status { border-top: 1px solid #2a241e; background: #1e1915; }
</style>

<div class="switch">
  <button class="on" data-s="sk-velvet">1 velvet</button>
  <button data-s="sk-warp">2 warp</button>
  <button data-s="sk-paper">3 paper</button>
  <button data-s="sk-forge">4 forge</button>
  <button data-s="sk-dusk">5 dusk</button>
  <span class="note">same layout, sessions under projects — style only</span>
</div>
<div id="stage"></div>

<template id="tpl">
  <div class="app">
    <div class="titlebar"><span>CircuitClaude</span><span class="win">— ▢ ✕</span></div>
    <div class="cols">
      <div class="sidebar">
        <div class="sb-hd"><span>Projects</span><span>+ new</span></div>
        <div class="sb-list">
          <div class="proj">circuitclaude <span class="cnt">3</span></div>
          <div class="sess act"><span class="dot run"></span><span class="nm">sidebar-redesign</span></div>
          <div class="sess"><span class="dot wait"></span><span class="nm">fix-cuda-build</span></div>
          <div class="sess"><span class="dot idle"></span><span class="nm">notes-panel</span></div>
          <div class="proj">project-ember <span class="cnt">2</span></div>
          <div class="sess"><span class="dot run"></span><span class="nm">vr-grip-poses</span></div>
          <div class="sess"><span class="dot idle"></span><span class="nm">netcode-audit</span></div>
          <div class="proj">temporal-api <span class="cnt">1</span></div>
          <div class="sess"><span class="dot idle"></span><span class="nm">auth-refresh</span></div>
        </div>
        <div class="sb-ft"><span>Settings</span></div>
      </div>
      <div class="main">
        <div class="tabs">
          <div class="tab act">Terminal</div><div class="tab">Conversation</div>
          <div class="tab">Files</div><div class="tab">Git · 2</div>
        </div>
        <div class="term">
          <div><span class="p">●</span> Refactoring Sidebar.tsx to flat session list…</div>
          <div class="dim">  ⎿ Read src/components/Sidebar.tsx (412 lines)</div>
          <div class="dim">  ⎿ Edit src/stores/sessionStore.ts</div>
          <div>&nbsp;</div>
          <div><span class="p">✻</span> Thinking… <span class="dim">(12s · 4.2k tokens)</span></div>
        </div>
        <div class="status"><span>master</span><span>+2 ~1</span><span style="margin-left:auto">2 running · 1 waiting</span></div>
      </div>
    </div>
  </div>
</template>

<script>
  const stage = document.getElementById('stage');
  const tpl = document.getElementById('tpl');
  function show(skin) {
    stage.innerHTML = '';
    const n = tpl.content.cloneNode(true);
    n.querySelector('.app').classList.add(skin);
    stage.appendChild(n);
  }
  document.querySelectorAll('.switch button').forEach(b => b.onclick = () => {
    document.querySelectorAll('.switch button').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    show(b.dataset.s);
  });
  show('sk-velvet');
</script>
